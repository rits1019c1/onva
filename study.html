<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study onva - Interactive Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ec2045.github.io/onva/byam.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #quiz-area .onva-images img {
            height: 2.5em !important;
        }

        @keyframes correct-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .correct-anim {
            animation: correct-pop 0.5s ease-out;
        }

        .vocab-card { transition: all 0.3s ease; }
        .vocab-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }

        input:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <span class="onva text-2xl font-bold text-slate-900">!anbya</span>
            </div>
            <div class="flex gap-8 text-[11px] font-bold tracking-widest text-slate-500 uppercase">
                <a href="index.html" class="hover:text-slate-900 transition font-black">Kingdom</a>
                <a href="anvum.html" class="hover:text-slate-900 transition font-black">!anbyam</a>
                <a href="study.html" class="text-blue-600 border-b-2 border-blue-600 pb-1 font-black">Study</a>
                <a href="translation.html" class="hover:text-slate-900 transition font-black">Translate</a>
                <a href="print.html" class="hover:text-slate-900 transition font-black">Practice</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-32 pb-24 px-6 max-w-5xl mx-auto w-full">
        
        <!-- Mode Selection Menu -->
        <div id="mode-menu" class="grid md:grid-cols-2 lg:grid-cols-5 gap-4 mb-16">
            <button onclick="startMode('char')" class="group p-6 bg-white border border-slate-100 rounded-[2.5rem] text-left hover:border-blue-500 hover:shadow-2xl transition-all flex flex-col justify-between">
                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500 mb-4 group-hover:scale-110 transition shrink-0">
                    <span class="onva text-2xl">!a</span>
                </div>
                <div>
                    <h2 class="text-xl font-black mb-2 leading-tight">byam文字を覚える</h2>
                    <p class="text-slate-400 text-xs">記号を見て対応する綴りを打ち込みます。</p>
                </div>
            </button>
            <button onclick="startMode('word')" class="group p-6 bg-white border border-slate-100 rounded-[2.5rem] text-left hover:border-indigo-500 hover:shadow-2xl transition-all flex flex-col justify-between">
                <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-500 mb-4 group-hover:scale-110 transition shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                </div>
                <div>
                    <h2 class="text-xl font-black mb-2 leading-tight">単語を覚える</h2>
                    <p class="text-slate-400 text-xs">日本語の意味からonvaの綴りを打ち込む実践モード。</p>
                </div>
            </button>
            <button onclick="startMode('read')" class="group p-6 bg-white border border-slate-100 rounded-[2.5rem] text-left hover:border-emerald-500 hover:shadow-2xl transition-all flex flex-col justify-between">
                <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500 mb-4 group-hover:scale-110 transition shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                </div>
                <div>
                    <h2 class="text-xl font-black mb-2 leading-tight">onva語を読む</h2>
                    <p class="text-slate-400 text-xs">onva記号を見て日本語の意味を当てる4択クイズ。</p>
                </div>
            </button>
            <button onclick="startMode('num')" class="group p-6 bg-white border border-slate-100 rounded-[2.5rem] text-left hover:border-orange-500 hover:shadow-2xl transition-all flex flex-col justify-between">
                <div class="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-500 mb-4 group-hover:scale-110 transition shrink-0">
                    <span class="text-xl font-black italic">123</span>
                </div>
                <div>
                    <h2 class="text-xl font-black mb-2 leading-tight">数字を覚える</h2>
                    <p class="text-slate-400 text-xs">アラビア数字をonvaの数体系へ変換するトレーニング。</p>
                </div>
            </button>
            <button onclick="startMode('phrase')" class="group p-6 bg-white border border-slate-100 rounded-[2.5rem] text-left hover:border-rose-500 hover:shadow-2xl transition-all flex flex-col justify-between">
                <div class="w-12 h-12 bg-rose-50 rounded-2xl flex items-center justify-center text-rose-500 mb-4 group-hover:scale-110 transition shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>
                </div>
                <div>
                    <h2 class="text-xl font-black mb-2 leading-tight">フレーズを覚える</h2>
                    <p class="text-slate-400 text-xs">日常会話や重要な文章の組み立てを学びます。</p>
                </div>
            </button>
        </div>

        <!-- Quiz Area -->
        <div id="quiz-area" class="hidden">
            <header class="mb-12 flex justify-between items-center">
                <button onclick="backToMenu()" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-slate-800 transition">← Back to Menu</button>
                <div class="flex gap-8">
                    <div class="text-right">
                        <div id="queue-count" class="text-2xl font-black text-rose-400 leading-none">0</div>
                        <div class="text-[8px] font-bold text-slate-300 uppercase tracking-widest mt-1">Review Queue</div>
                    </div>
                    <div class="text-right">
                        <div id="score" class="text-4xl font-black text-blue-600 leading-none">0</div>
                        <div class="text-[8px] font-bold text-slate-300 uppercase tracking-widest mt-1">Score</div>
                    </div>
                </div>
            </header>

            <div id="quiz-card" class="glass-card rounded-[3.5rem] p-12 shadow-2xl shadow-slate-100 text-center relative transition-all duration-500">
                <div id="current-mode-label" class="mb-8">
                    <span class="px-4 py-1 bg-slate-900 text-white text-[9px] font-black uppercase tracking-[0.2em] rounded-full">Mode</span>
                </div>
                
                <div class="mb-16 min-h-[160px] flex flex-col justify-center items-center">
                    <div id="question-text" class="text-4xl font-black text-slate-900 mb-6 h-12 flex items-center"></div>
                    <div id="question-symbol" class="onva scale-[1.8] py-8 h-32 flex items-center"></div>
                </div>

                <!-- Multiple Choice Area (Read Mode) -->
                <div id="options-grid" class="hidden grid grid-cols-2 gap-4 max-w-xl mx-auto mb-8"></div>

                <!-- Typing Area (Word & Char Modes) -->
                <div id="typing-area" class="max-w-xl mx-auto space-y-6">
                    <div class="onva text-4xl h-16 flex justify-center items-center text-blue-500 opacity-50" id="typing-echo"></div>
                    <input type="text" id="typing-input" autocomplete="off" placeholder="Type answer..." 
                        class="w-full bg-slate-50 border-2 border-slate-100 rounded-[2rem] px-8 py-5 text-2xl font-black text-center text-slate-900 focus:border-blue-500 transition">
                </div>

                <div id="message" class="mt-8 h-4 text-[10px] font-black uppercase tracking-widest opacity-0 transition-opacity"></div>
            </div>
        </div>

        <!-- Vocab Explorer -->
        <section class="mt-20">
            <header class="mb-12 flex justify-between items-center">
                <h2 class="text-2xl font-black text-slate-800">Vocabulary Explorer</h2>
                <div id="category-tabs" class="flex gap-2"></div>
            </header>
            <div id="vocab-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </section>
    </main>

    <script src="vocabulary.js"></script>
    <script>
        let vocabularyData = VOCABULARY_DATA;
        let allWordsFlat = [];
        let currentQuestion = null;
        let score = 0;
        let activeMode = null;
        let reviewQueue = []; // { item, delay }
        const REVIEW_DELAY = 3;
        let isCorrectionPhase = false;

        const byams = [
            {k: "!a", m: "ア゛"}, {k: "e", m: "エ"}, {k: "u", m: "ウ"}, {k: "wo", m: "ヲ"},
            {k: "i", m: "イ"}, {k: "yu", m: "ユ"}, {k: "r", m: "R"}, {k: "b", m: "B"},
            {k: "g", m: "G"}, {k: "p", m: "P"}, {k: "bya", m: "ビャ"}, {k: "m", m: "M"},
            {k: "n", m: "ン"}, {k: "z", m: "Z"}, {k: "sye", m: "シェ"}, {k: "ge", m: "ゲ"},
            {k: "t", m: "T"}, {k: "h", m: "H"}
        ];

        function convertNumberToOnva(num) {
            const numWords = {
                0: "n-!a", 1: "t-i", 2: "p-u", 3: "r-e", 4: "z-h", 5: "m-!a",
                6: "ge-t", 7: "yu-i", 8: "h-t", 9: "n-wo", 10: "wo-t",
                100: "t-wo", 1000: "wo-t!a"
            };
            if (num === 0) return numWords[0];
            let result = [];
            let n = num;
            const units = [
                { val: 1000, key: "wo-t!a" },
                { val: 100, key: "t-wo" },
                { val: 10, key: "wo-t" }
            ];
            units.forEach(unit => {
                let count = Math.floor(n / unit.val);
                if (count > 0) {
                    if (count > 1) result.push(numWords[count] + unit.key);
                    else result.push(unit.key);
                    n %= unit.val;
                }
            });
            if (n > 0) result.push(numWords[n]);
            return result.join(' ');
        }

        function init() {
            allWordsFlat = [];
            Object.values(vocabularyData).forEach(list => { allWordsFlat = [...allWordsFlat, ...list]; });
            renderTabs();
            renderCategory('basics');
        }

        function startMode(mode) {
            activeMode = mode;
            document.getElementById('mode-menu').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            
            let mName = '';
            if(mode === 'char') mName = 'byam文字を覚える';
            else if(mode === 'word') mName = '単語を覚える';
            else if(mode === 'read') mName = 'onva語を読む';
            else if(mode === 'num') mName = '数字を覚える';
            else if(mode === 'phrase') mName = 'フレーズを覚える';
            
            document.getElementById('current-mode-label').querySelector('span').textContent = mName;
            generateQuiz();
        }

        function backToMenu() {
            document.getElementById('mode-menu').classList.remove('hidden');
            document.getElementById('quiz-area').classList.add('hidden');
        }

        function generateQuiz() {
            const symEl = document.getElementById('question-symbol');
            const textEl = document.getElementById('question-text');
            const msgEl = document.getElementById('message');
            const inputEl = document.getElementById('typing-input');
            const echoEl = document.getElementById('typing-echo');
            const optionsGrid = document.getElementById('options-grid');
            const typingArea = document.getElementById('typing-area');

            msgEl.classList.add('opacity-0');
            inputEl.value = '';
            echoEl.innerHTML = '';
            delete symEl.dataset.processed;

            // Check review queue
            let fromQueue = false;
            for (let i = 0; i < reviewQueue.length; i++) {
                reviewQueue[i].delay--;
                if (reviewQueue[i].delay <= 0 && !fromQueue) {
                    currentQuestion = reviewQueue.splice(i, 1)[0].item;
                    fromQueue = true;
                }
            }
            document.getElementById('queue-count').textContent = reviewQueue.length;

            if (fromQueue) {
                // Same
            } else {
                if (activeMode === 'char') {
                    currentQuestion = byams[Math.floor(Math.random() * byams.length)];
                } else if (activeMode === 'phrase') {
                    currentQuestion = vocabularyData.phrases[Math.floor(Math.random() * vocabularyData.phrases.length)];
                } else if (activeMode === 'num') {
                    // Progressive difficulty based on score
                    let max = 10;
                    if (score > 600) max = 9999;
                    else if (score > 300) max = 999;
                    else if (score > 100) max = 99;
                    
                    const rand = Math.floor(Math.random() * (max + 1));
                    currentQuestion = {
                        k: convertNumberToOnva(rand),
                        m: rand.toString(),
                        type: 'number'
                    };
                } else {
                    currentQuestion = allWordsFlat[Math.floor(Math.random() * allWordsFlat.length)];
                }
            }

            if (activeMode === 'char') {
                symEl.innerHTML = currentQuestion.k;
                textEl.textContent = '';
                typingArea.classList.remove('hidden');
                optionsGrid.classList.add('hidden');
            } else if (activeMode === 'read') {
                symEl.innerHTML = currentQuestion.k;
                textEl.textContent = '';
                typingArea.classList.add('hidden');
                optionsGrid.classList.remove('hidden');
                
                let options = [currentQuestion.m];
                while(options.length < 4) {
                    let r = allWordsFlat[Math.floor(Math.random() * allWordsFlat.length)].m;
                    if(!options.includes(r)) options.push(r);
                }
                options.sort(() => Math.random() - 0.5);
                optionsGrid.innerHTML = '';
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "px-6 py-4 bg-white border border-slate-100 rounded-[2rem] font-bold text-sm text-slate-600 hover:border-emerald-500 hover:text-emerald-600 hover:shadow-lg transition-all";
                    btn.textContent = opt;
                    btn.onclick = () => checkChoiceAnswer(opt, btn);
                    optionsGrid.appendChild(btn);
                });
            } else if (activeMode === 'num') {
                textEl.textContent = currentQuestion.m;
                symEl.innerHTML = '';
                typingArea.classList.remove('hidden');
                optionsGrid.classList.add('hidden');
            } else {
                textEl.textContent = currentQuestion.m;
                symEl.innerHTML = '';
                typingArea.classList.remove('hidden');
                optionsGrid.classList.add('hidden');
            }

            if (window.renderOnva) window.renderOnva();
            if (activeMode !== 'read') inputEl.focus();
        }

        function checkAnswer(val) {
            const msgEl = document.getElementById('message');
            msgEl.classList.remove('opacity-0');
            const cardEl = document.getElementById('quiz-card');
            const inputEl = document.getElementById('typing-input');
            const echoEl = document.getElementById('typing-echo');
            
            if (val.toLowerCase() === currentQuestion.k.toLowerCase()) {
                if (!isCorrectionPhase) {
                    score += 10;
                    document.getElementById('score').textContent = score;
                    msgEl.textContent = "Correct! +10pts";
                    msgEl.className = "mt-8 h-4 text-[10px] font-black uppercase tracking-widest text-emerald-500";
                } else {
                    msgEl.textContent = "Good correction!";
                    msgEl.className = "mt-8 h-4 text-[10px] font-black uppercase tracking-widest text-blue-500";
                }
                
                isCorrectionPhase = false;
                cardEl.classList.add('correct-anim');
                
                setTimeout(() => {
                    cardEl.classList.remove('correct-anim');
                    generateQuiz();
                }, 1000);
            } else {
                if (!isCorrectionPhase) {
                    if (!reviewQueue.find(q => q.item.k === currentQuestion.k)) {
                        reviewQueue.push({ item: currentQuestion, delay: REVIEW_DELAY });
                    }
                    document.getElementById('queue-count').textContent = reviewQueue.length;
                    isCorrectionPhase = true;
                    
                    msgEl.textContent = "Wrong! Answer is: " + currentQuestion.k;
                    msgEl.className = "mt-8 h-4 text-[10px] font-black uppercase tracking-widest text-rose-500 transition-opacity duration-300";
                    inputEl.disabled = true;
                    inputEl.classList.add('opacity-50');
                    
                    setTimeout(() => {
                        msgEl.classList.add('opacity-0');
                        setTimeout(() => {
                            msgEl.textContent = "Now, type from memory!";
                            msgEl.classList.remove('text-rose-500');
                            msgEl.classList.add('text-amber-500');
                            msgEl.classList.remove('opacity-0');
                            
                            inputEl.disabled = false;
                            inputEl.classList.remove('opacity-50');
                            inputEl.value = '';
                            echoEl.innerHTML = '';
                            inputEl.focus();
                        }, 300);
                    }, 2000);
                } else {
                    msgEl.textContent = "Still incorrect. Answer is: " + currentQuestion.k;
                    msgEl.className = "mt-8 h-4 text-[10px] font-black uppercase tracking-widest text-rose-500 transition-opacity duration-300";
                    inputEl.disabled = true;
                    inputEl.classList.add('opacity-50');
                    
                    setTimeout(() => {
                        msgEl.classList.add('opacity-0');
                        setTimeout(() => {
                            msgEl.textContent = "Try again from memory.";
                            msgEl.classList.remove('text-rose-500');
                            msgEl.classList.add('text-amber-500');
                            msgEl.classList.remove('opacity-0');
                            
                            inputEl.disabled = false;
                            inputEl.classList.remove('opacity-50');
                            inputEl.value = '';
                            echoEl.innerHTML = '';
                            inputEl.focus();
                        }, 300);
                    }, 2000);
                }
            }
        }

        function reRenderOptions() {
            const oGrid = document.getElementById('options-grid');
            let opts = Array.from(oGrid.children).map(b => b.textContent);
            opts.sort(() => Math.random() - 0.5);
            oGrid.innerHTML = '';
            opts.forEach(opt => {
                const b = document.createElement('button');
                b.className = "px-6 py-4 bg-white border border-slate-100 rounded-[2rem] font-bold text-sm text-slate-600 hover:border-emerald-500 hover:text-emerald-600 hover:shadow-lg transition-all";
                b.textContent = opt;
                b.onclick = () => checkChoiceAnswer(opt, b);
                oGrid.appendChild(b);
            });
        }

        function checkChoiceAnswer(val, btn) {
            const msgEl = document.getElementById('message');
            msgEl.classList.remove('opacity-0');
            const cardEl = document.getElementById('quiz-card');
            
            if (val === currentQuestion.m) {
                if (!isCorrectionPhase) {
                    score += 10;
                    document.getElementById('score').textContent = score;
                    msgEl.textContent = "Correct! +10pts";
                    msgEl.className = "mt-8 h-4 text-[10px] font-black uppercase tracking-widest text-emerald-500";
                } else {
                    msgEl.textContent = "Good correction!";
                    msgEl.className = "mt-8 h-4 text-[10px] font-black uppercase tracking-widest text-blue-500";
                }
                btn.classList.add('bg-emerald-50', 'border-emerald-200', 'text-emerald-600');
                
                isCorrectionPhase = false;
                cardEl.classList.add('correct-anim');
                
                setTimeout(() => {
                    cardEl.classList.remove('correct-anim');
                    generateQuiz();
                }, 1000);
            } else {
                if (!isCorrectionPhase) {
                    if (!reviewQueue.find(q => q.item.k === currentQuestion.k)) {
                        reviewQueue.push({ item: currentQuestion, delay: REVIEW_DELAY });
                    }
                    document.getElementById('queue-count').textContent = reviewQueue.length;
                    isCorrectionPhase = true;
                    
                    msgEl.textContent = "Wrong! Answer is: " + currentQuestion.m;
                    msgEl.className = "mt-8 h-4 text-[10px] font-black uppercase tracking-widest text-rose-500 transition-opacity duration-300";
                    
                    document.querySelectorAll('#options-grid button').forEach(b => { b.disabled = true; b.classList.add('opacity-50'); });
                    
                    setTimeout(() => {
                        msgEl.classList.add('opacity-0');
                        setTimeout(() => {
                            msgEl.textContent = "Now, pick from memory!";
                            msgEl.classList.remove('text-rose-500');
                            msgEl.classList.add('text-amber-500');
                            msgEl.classList.remove('opacity-0');
                            reRenderOptions();
                        }, 300);
                    }, 2000);
                } else {
                    msgEl.textContent = "Still incorrect. Answer is: " + currentQuestion.m;
                    msgEl.className = "mt-8 h-4 text-[10px] font-black uppercase tracking-widest text-rose-500 transition-opacity duration-300";
                    document.querySelectorAll('#options-grid button').forEach(b => { b.disabled = true; b.classList.add('opacity-50'); });
                    
                    setTimeout(() => {
                        msgEl.classList.add('opacity-0');
                        setTimeout(() => {
                            msgEl.textContent = "Try again.";
                            msgEl.classList.remove('text-rose-500');
                            msgEl.classList.add('text-amber-500');
                            msgEl.classList.remove('opacity-0');
                            reRenderOptions();
                        }, 300);
                    }, 2000);
                }
            }
        }

        document.getElementById('typing-input').addEventListener('input', (e) => {
            const echo = document.getElementById('typing-echo');
            echo.innerHTML = e.target.value;
            delete echo.dataset.processed;
            if (window.renderOnva) window.renderOnva();
        });

        document.getElementById('typing-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer(e.target.value);
        });

        // Tabs & Explorer Logic
        function renderTabs() {
            const container = document.getElementById('category-tabs');
            container.innerHTML = '';
            Object.keys(vocabularyData).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = "px-4 py-2 bg-white border border-slate-200 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-slate-50 transition";
                btn.textContent = cat;
                btn.onclick = () => renderCategory(cat);
                container.appendChild(btn);
            });
        }

        function renderCategory(cat) {
            const container = document.getElementById('vocab-grid');
            container.innerHTML = '';
            vocabularyData[cat].forEach(item => {
                const card = document.createElement('div');
                card.className = "vocab-card bg-white p-6 rounded-3xl border border-slate-100 flex flex-col items-center text-center";
                card.innerHTML = `<div class="onva text-2xl mb-4 min-h-[3rem] w-full flex items-center justify-center overflow-hidden flex-wrap">${item.k}</div><div class="text-[10px] font-mono text-slate-400 uppercase mb-2 break-all">${item.k}</div><div class="text-xs font-bold text-slate-500 leading-tight">${item.m}</div>`;
                container.appendChild(card);
            });
            if (window.renderOnva) window.renderOnva();
        }

        window.addEventListener('load', init);
    </script>
</body>
