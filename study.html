<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study onva - Interactive Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://rits1019c1.github.io/onva/byam.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .hero-gradient {
            background: radial-gradient(circle at 10% 20%, rgba(242, 252, 254, 1) 0%, rgba(238, 242, 243, 1) 90.1%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .onva-images img {
            height: 2.5em !important;
        }

        @keyframes correct-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .correct-anim {
            animation: correct-pop 0.5s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <span class="onva text-2xl font-bold text-slate-900">!anbya</span>
            </div>
            <div class="flex gap-8 text-[11px] font-bold tracking-widest text-slate-500 uppercase">
                <a href="index.html" class="hover:text-slate-900 transition font-black">Kingdom</a>
                <a href="anvum.html" class="hover:text-slate-900 transition font-black">!anbyam</a>
                <a href="study.html" class="text-blue-600 border-b-2 border-blue-600 pb-1 font-black">Study</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-32 pb-24 px-6 max-w-4xl mx-auto w-full">
        <!-- Progress Header -->
        <header class="mb-12 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black text-slate-900 mb-2">Flash Cards</h1>
                <p class="text-slate-400 font-bold uppercase tracking-widest text-[10px]">Vocabulary Mastery</p>
            </div>
            <div class="text-right">
                <div id="score" class="text-3xl font-black text-blue-600">0</div>
                <div class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">Points</div>
            </div>
        </header>

        <!-- Quiz Container -->
        <div id="quiz-container" class="glass-card rounded-[3rem] p-12 shadow-2xl shadow-indigo-100/50 text-center relative overflow-hidden transition-all duration-500">
            <!-- Question Region -->
            <div class="mb-16">
                <div id="question-symbol" class="onva flex justify-center mb-8 scale-150 py-12">
                    <!-- Symbol will be injected here -->
                </div>
                <div id="message" class="h-6 text-sm font-bold opacity-0 transition-opacity">
                    <!-- Correct/Incorrect message -->
                </div>
            </div>

            <!-- Options Grid -->
            <div id="options" class="grid grid-cols-2 gap-4">
                <!-- Buttons will be injected here -->
            </div>

            <button id="next-btn" class="hidden mt-12 px-12 py-4 bg-slate-900 text-white rounded-full font-bold hover:bg-slate-800 transition shadow-xl shadow-slate-200 mx-auto">
                Next Word →
            </button>
        </div>

        <!-- Instructions -->
        <footer class="mt-12 text-center">
            <p class="text-slate-400 text-sm">
                記号の意味に最も近い日本語を選んでください。
            </p>
        </footer>
    </main>

    <script>
        const vocabulary = [
            { k: "!ann", m: "知恵/思考" },
            { k: "!anbya", m: "国/中心" },
            { k: "be", m: "美" },
            { k: "wo-!a", m: "太陽" },
            { k: "ritt", m: "AI/計算" },
            { k: "!aiwon", m: "iPhone/スマホ" },
            { k: "bya", m: "話す" },
            { k: "h", m: "持つ" },
            { k: "b-!a", m: "こんにちは" },
            { k: "byap!an", m: "日本" },
            { k: "yu-ri!a", m: "ユーラシア大陸" },
            { k: "p-u", m: "2（二）" },
            { k: "sye!ab", m: "よろしくお願いします" }
        ];

        let currentQuestion = null;
        let score = 0;

        function getRandomItem() {
            return vocabulary[Math.floor(Math.random() * vocabulary.length)];
        }

        function generateQuiz() {
            currentQuestion = getRandomItem();
            const symbolEl = document.getElementById('question-symbol');
            symbolEl.textContent = currentQuestion.k;
            symbolEl.dataset.processed = "";
            
            if (window.renderOnva) window.renderOnva();

            // Generate alternatives
            let options = [currentQuestion.m];
            while (options.length < 4) {
                const randomItem = getRandomItem().m;
                if (!options.includes(randomItem)) {
                    options.push(randomItem);
                }
            }
            options.sort(() => Math.random() - 0.5);

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "px-6 py-6 bg-white border border-slate-100 rounded-3xl font-bold text-slate-600 hover:border-blue-400 hover:text-blue-600 hover:shadow-lg hover:shadow-blue-50 transition-all duration-300";
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('message').classList.add('opacity-0');
            document.getElementById('quiz-container').classList.remove('correct-anim');
        }

        function checkAnswer(answer, btn) {
            const msgEl = document.getElementById('message');
            msgEl.classList.remove('opacity-0');
            
            if (answer === currentQuestion.m) {
                score += 10;
                document.getElementById('score').textContent = score;
                msgEl.textContent = "Correct! +10pts";
                msgEl.className = "h-6 text-sm font-black text-emerald-500 transition-opacity";
                btn.classList.add('bg-emerald-50', 'border-emerald-200', 'text-emerald-600');
                document.getElementById('quiz-container').classList.add('correct-anim');
                
                setTimeout(() => {
                    generateQuiz();
                }, 1000);
            } else {
                msgEl.textContent = "Try again!";
                msgEl.className = "h-6 text-sm font-black text-rose-500 transition-opacity";
                btn.classList.add('bg-rose-50', 'border-rose-200', 'text-rose-600');
                setTimeout(() => {
                    msgEl.classList.add('opacity-0');
                    btn.className = "px-6 py-6 bg-white border border-slate-100 rounded-3xl font-bold text-slate-600 transition-all";
                }, 1000);
            }
        }

        // Wait for byam.js to load
        window.addEventListener('load', () => {
            generateQuiz();
        });
    </script>
</body>
</html>
